<!--
@MAC-ALLOW:AXExpanded
@WIN-ALLOW:details-roles*
@WIN-ALLOW:EXPANDED*
@WIN-ALLOW:HASPOPUP*
@WIN-ALLOW:haspopup*
@BLINK-ALLOW:haspopup*
@BLINK-ALLOW:expanded*
@AURALINUX-ALLOW:details-roles*
@AURALINUX-ALLOW:expanded*
@AURALINUX-ALLOW:haspopup:*
-->

<!-- Non-visible menulist should show collapsed menuitem and button -->
<button command=toggle-popover commandfor=closedmenu></button>
<menubar>
  <submenu>
    <menuitem>First item</menuitem>
    <menulist id=closedmenu></menulist>
  </submenu>
  <menuitem>No command item</menuitem>
  <menuitem command=--custom-command commandfor=closedmenu>Custom command item</menuitem>
</menubar>

<!-- Visible menulist should show expanded menuitem and button (see script
below) -->
<button command=toggle-popover commandfor=openedmenu></button>
<menubar>
  <submenu>
    <menuitem>First item</menuitem>
    <menulist id=openedmenu></menulist>
  </submenu>
</menubar>

<!-- Submenu menuitem shows collapsed state -->
<menubar>
  <submenu>
    <menuitem>First item</menuitem>
    <menulist id=submenu1>
      <menuitem>Submenu1 first item</menuitem>
      <submenu>
        <menuitem>Submenu1 second item</menuitem>
        <menulist id=submenu2>
          <menuitem>Submenu2 first item</menuitem>
        </menulist>
      </submenu>
    </menulist>
  </submenu>
</menubar>

<!-- This menuitem should show a collapsed state; script shows and then hides
the submenu, which should apply `expanded=true` and then `expanded=false`, thus
ultimately resulting in the collapsed state -->
<menubar>
  <submenu>
    <menuitem>First item</menuitem>
    <menulist id=submenu3></menulist>
  </submenu>
</menubar>

<script>
  openedmenu.showPopover();
  submenu1.showPopover();

  // See documentation above.
  submenu2.showPopover();
  submenu2.hidePopover();
</script>
