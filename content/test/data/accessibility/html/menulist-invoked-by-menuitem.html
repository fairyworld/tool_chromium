<!DOCTYPE html>
<button id="btn" commandfor="main-menu" command="toggle-popover">Open Main Menu</button>
<menulist id="main-menu">
  <submenu>
    <menuitem id="submenu-invoker">Submenu</menuitem>
    <menulist>
      <menuitem>Item 1</menuitem>
    </menulist>
  </submenu>
</menulist>
<script>
  window.addEventListener('load', () => {
    btn.click();
    document.getElementById('submenu-invoker').click();
  });
</script>
