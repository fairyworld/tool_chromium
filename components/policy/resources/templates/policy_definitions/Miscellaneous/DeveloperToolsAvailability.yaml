arc_support: This policy also controls access to Android Developer Options. If you set
  this policy to 'DeveloperToolsDisallowed' (value 2), users cannot access
  Developer Options. If you set this policy to another value or leave it
  unset, users can access Developer Options by tapping seven times on the
  build number in the Android settings app.
caption: Control where Developer Tools can be used
desc: |-
  Setting 0 (Default): Dev tools are available for standard web browsing, but restricted for enterprise-installed extensions and managed user built-in extensions. Starting in version M150, they are also blocked on any page that embeds these extensions, with the sole exception of the built-in PDF viewer.

  Setting 1: Dev tools and the console are completely unlocked and accessible in all contexts, including within enterprise-policy extensions.

  Setting 2: Dev tools and element inspection are entirely disabled browser-wide.

  This setting also turns off keyboard shortcuts and menu or context menu entries to open developer tools or the JavaScript console.

  As of <ph name="PRODUCT_NAME">$1<ex>Google Chrome</ex></ph> version 99, this setting also controls entry points for the 'View page source' feature. If you set this policy to 'DeveloperToolsDisallowed' (value 2), users cannot access source viewing via keyboard shortcut or the context menu. To fully block source viewing, you must also add 'view-source:*' to the <ph name="URL_BLOCKLIST_POLICY_NAME">URLBlocklist</ph> policy.

  As of <ph name="PRODUCT_NAME">$1<ex>Google Chrome</ex></ph> version 119, this setting also controls whether developer mode for Isolated Web Apps can be activated and used.

  As of <ph name="PRODUCT_NAME">$1<ex>Google Chrome</ex></ph> version 128, this setting will not control developer mode on extensions page if <ph name="EXTENSION_DEVELOPER_MODE_SETTINGS_POLICY_NAME">ExtensionDeveloperModeSettings</ph> policy is set.

  The availability of Developer Tools is determined in the following order of precedence:
  1. If a URL matches a pattern in the <ph name="DEVELOPER_TOOLS_AVAILABILITY_ALLOWLIST_POLICY_NAME">DeveloperToolsAvailabilityAllowlist</ph> policy, Developer Tools are allowed.
  2. If the <ph name="DEVELOPER_TOOLS_AVAILABILITY_ALLOWLIST_POLICY_NAME">DeveloperToolsAvailabilityAllowlist</ph> is set and the <ph name="DEVELOPER_TOOLS_AVAILABILITY_BLOCKLIST_POLICY_NAME">DeveloperToolsAvailabilityBlocklist</ph> is not, any URL not on the allowlist is blocked.
  3. If a URL matches a pattern in the <ph name="DEVELOPER_TOOLS_AVAILABILITY_BLOCKLIST_POLICY_NAME">DeveloperToolsAvailabilityBlocklist</ph> policy, Developer Tools are blocked.
  4. If a URL is not covered by the allowlist or blocklist, this policy (<ph name="DEVELOPER_TOOLS_AVAILABILITY_POLICY_NAME">DeveloperToolsAvailability</ph>) is the fallback.
default: 0
example_value: 2
features:
  dynamic_refresh: true
  per_profile: true
future_on:
- android
- fuchsia
items:
- caption: Allow usage of the Developer Tools for standard web browsing, but restrict the usage for enterprise-installed extensions and managed user built-in extensions. Starting in version M150, they are also blocked on any page that embeds these extensions, with the sole exception of the built-in PDF viewer.
  name: DeveloperToolsDisallowedForForceInstalledExtensions
  value: 0
- caption: Allow usage of the Developer Tools in all contexts, including within enterprise-policy extensions
  name: DeveloperToolsAllowed
  value: 1
- caption: Disallow usage of the Developer Tools entirely
  name: DeveloperToolsDisallowed
  value: 2
owners:
