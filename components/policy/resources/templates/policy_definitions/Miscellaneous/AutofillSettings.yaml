caption: Block Autofill data types for specific sites
default: []
desc: |-
  Setting this policy allows you to specify which Autofill data types are blocked on specific URL patterns.

  The policy is structured as a list of dictionaries. Each dictionary must contain:
  * "url_pattern": A content setting URL pattern (e.g., "https://[*.]example.com").
  * "blocked_types": A list of strings representing the categories of Autofill data to block.

  The supported values for "blocked_types" are:
  * "contact_info": Blocks filling and saving of contact information.
  * "payments": Blocks filling and saving of credit cards and payment methods.
  * "identity_docs": Blocks filling and saving of identity documents (e.g. passport, drivers license, national id).
  * "travel": Blocks filling and saving of travel information (e.g. flight reservation, vehicle registration).

  If a data type is blocked for a site, both the generation of suggestions and the prompt to save/import new data of that type are disabled on that site.

  If a URL matches multiple pattern entries in the list, the blocked types from all matching entries are combined (union-merged). Invalid URL patterns in the list are ignored.

  If this policy is unset, no Autofill data types are blocked by domain.

  For detailed information on valid URL patterns, please see:
  https://chromeenterprise.google/policies/url-patterns. Wildcard * is supported, this pattern matches any URL, with any scheme, port, and path.

example_value:
- url_pattern: 'https://[*.]example.com'
  blocked_types:
  - contact_info
  - payments
- url_pattern: 'https://another-example.com'
  blocked_types:
  - payments
- url_pattern: '*'
  blocked_types:
  - identity_docs
features:
  dynamic_refresh: true
  per_profile: true
owners:
- file://components/autofill/OWNERS
schema:
  items:
    properties:
      url_pattern:
        type: string
      blocked_types:
        items:
          enum:
          - contact_info
          - payments
          - identity_docs
          - travel
          type: string
        type: array
    required:
    - url_pattern
    - blocked_types
    type: object
  type: array
future_on:
- chrome.*
- chrome_os
- android
- ios
- fuchsia
tags: []
type: dict
