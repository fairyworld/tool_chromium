caption: Allow automatic downloads on these sites
desc: |-
  Allows you to set a list of URL patterns that specify sites which are allowed to download multiple files automatically.

  For detailed information on valid URL patterns, please see https://chromeenterprise.google/policies/url-patterns.

  If a URL matches both <ph name="AUTOMATIC_DOWNLOADS_ALLOWED_FOR_URLS_POLICY_NAME">AutomaticDownloadsAllowedForUrls</ph> and <ph name="AUTOMATIC_DOWNLOADS_BLOCKED_FOR_URLS_POLICY_NAME">AutomaticDownloadsBlockedForUrls</ph>, AutomaticDownloadsBlockedForUrls takes precedence.

  If this policy is not set, <ph name="DEFAULT_AUTOMATIC_DOWNLOADS_SETTING_POLICY_NAME">DefaultAutomaticDownloadsSetting</ph> applies for all sites, if it is set. If not, the user's personal setting applies.
example_value:
- https://www.example.com
- '[*.]example.edu'
features:
  dynamic_refresh: true
  per_profile: true
owners:
- file://chrome/browser/download/OWNERS
- poromov@google.com
schema:
  items:
    type: string
  type: array
supported_on:
- chrome.*:151-
- chrome_os:151-
- android:151-
tags:
- website-sharing
type: list