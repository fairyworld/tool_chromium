caption: Default automatic downloads setting
default: null
desc: |-
  Setting the policy to 1 lets websites download multiple files automatically. Setting the policy to 2 denies this permission. You can set the policy to ask whenever a website wants to download multiple files automatically.

  Leaving the policy unset means the AskAutomaticDownloads policy applies, but users can change this setting.
example_value: 3
features:
  dynamic_refresh: true
  per_profile: true
items:
- caption: Allow sites to download multiple files automatically
  name: AllowAutomaticDownloads
  value: 1
- caption: Do not allow any site to download multiple files automatically
  name: BlockAutomaticDownloads
  value: 2
- caption: Ask whenever a site wants to download multiple files automatically
  name: AskAutomaticDownloads
  value: 3
owners:
- file://chrome/browser/download/OWNERS
- poromov@google.com
schema:
  enum:
  - 1
  - 2
  - 3
  type: integer
supported_on:
- chrome.*:151-
- chrome_os:151-
- android:151-
tags:
- website-sharing
type: int-enum