caption: Re-suspend delay for weekly scheduled suspend intervals in milliseconds
desc: |-
  Setting the policy specifies the number of milliseconds of inactivity before the device re-applies the suspend action during a <ph name="DEVICE_WEEKLY_SCHEDULED_SUSPEND_POLICY_NAME">DeviceWeeklyScheduledSuspend</ph> interval.

  If a device is manually woken up (e.g., by keyboard input) during its scheduled sleep window, the device will wait this many milliseconds before suspending to RAM again. Any user activity will reset the resuspend timer as long as it remains within the suspend interval.

  If the policy is unset, the device will not automatically re-suspend during the interval after being woken up.
device_only: true
example_value: 600000
features:
  dynamic_refresh: true
owners:
- file://chrome/browser/ash/app_mode/OWNERS
schema:
  type: integer
  minimum: 1000
supported_on:
- chrome_os:151-
