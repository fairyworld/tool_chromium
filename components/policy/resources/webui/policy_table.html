<style>
/*
 * Note: some styles below are duplicated across a few HTML files (policy_row,
 * policy_precedence_row, policy_conflict, policy_table). This is preferable
 * to using a stylesheet, as otherwise the content appears unstyled initially
 * and then flashes to the correct styling after the stylesheet loads.
 */
:host(:not([hidden])) {
  display: block;
}

.row:not([hidden]) {
  display: flex;
}
.row > * {
  align-items: center;
  box-sizing: border-box;
  display: flex;
  flex-direction: row;
  gap: 5px;
  justify-content: space-between;
  overflow: hidden;
  padding: 12px;
  text-align: start;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.policy-table {
  margin-bottom: 5px;
  margin-top: 17px;
  position: relative;
  width: 100%;
}

.policy-table .main {
  border: 1px solid var(--table-border);
  border-radius: var(--element-border-radius);
}

.policy-precedence-data {
  border-top: 1px solid var(--table-border);
}

.level,
.status,
.name,
.scope,
.source,
.value {
  border-inline-end: 1px solid var(--table-border);
}

.row.header {
  background-color: var(--table-header);
  border-bottom: 1px solid var(--table-border);
  border-radius: var(--element-border-radius) var(--element-border-radius) 0 0;
  display: grid;
  grid-template-columns: 25% 30% 10% 10% 10% 10% 5%;
  grid-template-areas: 'name value source scope level status toggle';
}

.row.header .name {
  grid-area: name;
}
.row.header .value {
  grid-area: value;
}
.row.header .source {
  grid-area: source;
}
.row.header .scope {
  grid-area: scope;
}
.row.header .level {
  grid-area: level;
}
.row.header .status {
  grid-area: status;
}
.row.header .toggle {
  grid-area: toggle;
}

.sort-arrows {
  cursor: pointer;
  display: flex;
  flex-direction: column;
}

.sort-up-arrow {
  background-image: url(chrome://resources/images/icon_expand_less.svg);
}

.sort-down-arrow {
  background-image: url(chrome://resources/images/icon_expand_more.svg);
}

.sort-up-arrow,
.sort-down-arrow {
  background-color: transparent;
  background-size: cover;
  border: none;
  cursor: pointer;
  height: 15px;
  width: 15px;
}

.value.row .value {
  font-family: monospace;
}

.no-policy:not([hidden]) {
  display: flex;
  justify-content: center;
  padding: 12px;
}

a {
  color: var(--link-color);
  cursor: pointer;
  text-decoration: underline;
}

.updater-link {
  font-size: smaller;
  margin-inline-start: 10px;
}

.toggle {
  cursor: pointer;
}

@media (max-width: 768px) {
  .value,
  .level,
  .status,
  .scope {
    display: none;
  }

  .row.header {
    grid-template-columns: 50% 25% 25%;
    grid-template-areas: 'name source toggle';
  }

  .reload-show-unset-section {
    flex-wrap: wrap;
  }

  .policy-table .main {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .policy-table .main .row > * {
    overflow: visible;
  }
}
<if expr="is_android or is_ios">
.sort-up-arrow,
.sort-down-arrow {
  width: 48px;
  height: 48px;
}
</if>
</style>
<div class="policy-table" role="table" aria-labelledby="policy-header">
  <h2 class="header" id="policy-header"></h2>
  <p class="id"></p>
  <div class="main">
    <div class="header row" role="row">
      <div class="name" role="columnheader" aria-sort="none" aria-label="$i18n{headerName}">
        $i18n{headerName}
        <div class="sort-arrows">
          <button
            class="sort-up-arrow"
            id="name-sort-up" role="button"
            aria-hidden="false"
            title="$i18n{sort} $i18n{headerName} $i18n{sortAscending}">
          </button>
          <button
            class="sort-down-arrow"
            id="name-sort-down"
            role="button"
            aria-hidden="false"
            title="$i18n{sort} $i18n{headerName} $i18n{sortDescending}">
          </button>
        </div>
      </div>
      <div class="value" role="columnheader" aria-label="$i18n{headerValue}">
        $i18n{headerValue}
      </div>
      <div class="source" role="columnheader" aria-sort="none" aria-label="$i18n{headerSource}">
        $i18n{headerSource}
        <div class="sort-arrows">
          <button
            class="sort-up-arrow"
            id="source-sort-up"
            role="button"
            aria-hidden="false"
            title="$i18n{sort} $i18n{headerSource} $i18n{sortAscending}">
          </button>
          <button
            class="sort-down-arrow"
            id="source-sort-down"
            role="button"
            aria-hidden="false"
            title="$i18n{sort} $i18n{headerSource} $i18n{sortDescending}">
          </button>
        </div>
      </div>
      <div class="scope" role="columnheader" aria-sort="none" aria-label="$i18n{headerScope}">
        $i18n{headerScope}
        <div class="sort-arrows">
          <button
            class="sort-up-arrow"
            id="scope-sort-up"
            role="button"
            aria-hidden="false"
            title="$i18n{sort} $i18n{headerScope} $i18n{sortAscending}">
          </button>
          <button
            class="sort-down-arrow"
            id="scope-sort-down"
            role="button"
            aria-hidden="false"
            title="$i18n{sort} $i18n{headerScope} $i18n{sortDescending}">
          </button>
        </div>
      </div>
      <div class="level" role="columnheader" aria-sort="none" aria-label="$i18n{headerLevel}">
        $i18n{headerLevel}
        <div class="sort-arrows">
          <button
            class="sort-up-arrow"
            id="level-sort-up"
            role="button"
            aria-hidden="false"
            title="$i18n{sort} $i18n{headerLevel} $i18n{sortAscending}">
          </button>
          <button
            class="sort-down-arrow"
            id="level-sort-down"
            role="button"
            aria-hidden="false"
            title="$i18n{sort} $i18n{headerLevel} $i18n{sortDescending}">
          </button>
        </div>
      </div>
      <div class="status" role="columnheader" aria-sort="none" aria-label="$i18n{headerStatus}">
        $i18n{headerStatus}
        <div class="sort-arrows">
          <button
            class="sort-up-arrow"
            id="status-sort-up"
            role="button"
            aria-hidden="false"
            title="$i18n{sort} $i18n{headerStatus} $i18n{sortAscending}">
          </button>
          <button
            class="sort-down-arrow"
            id="status-sort-down"
            role="button"
            aria-hidden="false"
            title="$i18n{sort} $i18n{headerStatus} $i18n{sortDescending}">
          </button>
        </div>
      </div>
      <div class="toggle" role="columnheader"></div>
    </div>
    <div class="no-policy">$i18n{noPoliciesSet}</div>
  </div>
</div>
