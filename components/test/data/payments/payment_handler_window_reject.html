<html lang="en">
  <head>
    <title>Payment App Error After User Interaction</title>
    <meta charset="utf-8">
  </head>
  <body>
    <button id="reject-button">Reject Payment</button>
    <script>
      document.getElementById('reject-button').addEventListener('click', () => {
        navigator.serviceWorker.controller.postMessage('reject');
      });
      // Providing page loaded signal for payment app service worker to
      // immediately reject promise and cause an error status.
      navigator.serviceWorker.controller.postMessage('loaded');
    </script>
  </body>
</html>
