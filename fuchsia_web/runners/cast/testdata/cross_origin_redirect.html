<!DOCTYPE html>
<html>
<head><title>legitimate cast app</title></head>
<body>
<script>
  // This page is the registered Cast application's web_url. It simulates a Cast
  // app that performs (or can be induced to perform) a top-level cross-origin
  // navigation: an ad redirect, OAuth flow, deep-link, open redirect, etc.
  //
  // cast_runner installs no NavigationPolicyProvider, so nothing in cast_runner
  // blocks this navigation.
  //
  // The destination URL is passed in the query string so the test can point it
  // at a second EmbeddedTestServer (a different port == a different origin).
  window.addEventListener('load', () => {
    const target = decodeURIComponent(location.search.substring(1));
    if (target) {
      // Top-level, script-initiated, cross-origin navigation.
      location.href = target;
    }
  });
</script>
</body>
</html>
