<!DOCTYPE html>
<script src="../../resources/testharness.js"></script>
<script src="../../resources/testharnessreport.js"></script>
<script src="../../resources/gesture-util.js"></script>
<script src="../../animations/web-animations/resources/testcommon.js"></script>
<style>
div {
  position: absolute;
}
#scroller {
  width: 500px;
  height: 500px;
  overflow: scroll;
  scroll-snap-type: both mandatory;
  border: solid black 5px;
}
#space {
  width: 2000px;
  height: 2000px;
}
.target {
  width: 200px;
  height: 200px;
  scroll-snap-align: start;
  background-color: blue;
}
</style>

<div id="scroller">
  <div id="space"></div>
  <div class="target" style="left: 0px; top: 0px;"></div>
  <div class="target" style="left: 80px; top: 80px;"></div>
  <div class="target" style="left: 200px; top: 200px;"></div>
</div>

<script>
if (window.internals) {
  internals.runtimeFlags.implicitRootScrollerEnabled = true;
}

const body = document.body;
const scroller = document.getElementById("scroller");
const space = document.getElementById("space");

function reset() {
  return Promise.all([
    waitForScrollReset(scroller),
    waitForCompositorCommit()
  ]);
}

function updateDuringFling(update) {
  const scroll_promise = waitForScrollEvent(scroller);
  const gesture = swipe(100, 200, 200, 'upleft', 1000);
  // Once the promises for the scroll gestures and the update during scroll
  // have both resolved, wait a few more frames to ensure there is no crash.
  return Promise.all([
    scroll_promise.then(update),
    gesture
  ]).then(waitForAnimationFrames(2));
}

promise_test (async () => {
  await reset();
  await updateDuringFling(() => {
    scroller.removeChild(space);
  });
  scroller.appendChild(space);
}, "Should not crash if the scroll range becomes zero during fling.");

promise_test (async () => {
  await reset();
  await updateDuringFling(() => {
    scroller.style.overflow = 'clip';
  });
  scroller.style = '';
}, "Should not crash if the scroller becomes unscrollable during fling.");

promise_test (async () => {
  await reset();
  await updateDuringFling(() => {
    body.removeChild(scroller);
  });
  body.appendChild(scroller);
}, "Should not crash if the scroller is removed during fling.");
</script>
