<!DOCTYPE html>
<html class="reftest-wait">
<meta charset="utf-8">
<link rel="author" href="mailto:masonf@chromium.org">
<link rel="help" href="https://crbug.com/508672616">
<link rel="match" href="unbounded-element-appearance-ref.html">
<script src="/resources/testdriver.js"></script>
<script src="/resources/testdriver-vendor.js"></script>
<script src="resources/unbounded-utils.js"></script>

<style>
  #target {
    position: absolute;
    top: 100px;
    left: 100px;
    width: 200px;
    height: 200px;
    overflow: scroll;
    scrollbar-width: none;
    border: none;
    background: transparent;
  }
  #target::-webkit-scrollbar {
    display: none;
  }
  #content {
    position: absolute;
    top: 0;
    left: 0;
    width: 200px;
    height: 400px;
  }
  .red-box {
    position: absolute;
    top: 0;
    left: 0;
    width: 200px;
    height: 200px;
    background: red;
  }
  .green-box {
    position: absolute;
    top: 200px;
    left: 0;
    width: 200px;
    height: 200px;
    background: green;
  }
</style>

<div id="target" unbounded>
  <div id="content">
    <div class="red-box"></div>
    <div class="green-box"></div>
  </div>
</div>

<script>
unbounded_appearance_test(async () => {
  await showUnboundedElement(target);

  // Scroll the unbounded element itself
  target.scrollTop = 200;

  // Wait for layout/paint to update
  await new Promise(requestAnimationFrame);
  await new Promise(requestAnimationFrame);

  visual_assert_true(target.matches(':unbounded'), "Target should still be unbounded after scroll");
});
</script>
