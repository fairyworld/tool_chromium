<!DOCTYPE HTML>
<html class="reftest-wait">
<head>
  <title>texElementImage2D paints video frames in worker thread</title>
  <link rel="help" href="https://github.com/WICG/html-in-canvas">
  <link rel="match" href="webgl-video-worker-ref.html">
  <link rel="stylesheet" href="/wpt_internal/resources/canvas-draw-element/styles.css" />
  <meta name="fuzzy" content="maxDifference=0-3; totalPixels=0-40000" />
  <script src="/resources/testdriver.js"></script>
  <script src="/resources/testdriver-vendor.js"></script>
  <script src="/common/reftest-wait.js"></script>
</head>
<body>

  <canvas id="canvas" width="200" height="200" layoutsubtree>
    <div id="child" class="draw-element-wrapper">
      <video width="100" height="100" src="/wpt_internal/resources/canvas-draw-element/rgb100.webm"></video>
    </div>
  </canvas>

  <script type="module">
  const canvas = document.getElementById("canvas");
  const child = document.getElementById("child");
  const video = document.querySelector("video");
  const worker = new Worker("webgl-video-worker.js");
  const offscreen = canvas.transferControlToOffscreen();
  worker.postMessage({ canvas: offscreen, reftest: true }, [offscreen]);
  worker.addEventListener("message", e => {
    if (e.data.gl_ready) {
      test_driver.bless('play video', () => {
        const pushFrame = () => {
          canvas.addEventListener("paint", evt => {
            const elementImage = canvas.captureElementImage(child);
            worker.postMessage({ elementImage: elementImage }, [elementImage]);
          }, {once:true});
          video.requestVideoFrameCallback(pushFrame);
        };
        video.play();
        pushFrame();
      });
    }
    if (e.data.done) {
      takeScreenshot();
    }
  });
  </script>
</body>
</html>
