<!DOCTYPE html>
<title>:trigger-link</title>
<link rel="author" title="Morten Stenshorne" href="mailto:mstensho@chromium.org">
<link rel="help" href="https://drafts.csswg.org/css-navigation-1/#trigger-link-pseudo-class">
<style>
  :trigger-link {
    --trigger: matched;
  }
</style>
<a id="elm1" href="/target/">elm</a>
<a id="elm2" href="/target/">elm</a>
<a id="elm3" href="/different/">elm</a>
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>0
<script src="/resources/testdriver.js"></script>
<script src="/resources/testdriver-actions.js"></script>
<script src="/resources/testdriver-vendor.js"></script>
<script src="resources/test-navigation.js"></script>
<script>
  async function clickElm(elm) {
    let rect = elm.getBoundingClientRect();
    await new test_driver.Actions().pointerMove(rect.left + 2, rect.top + 2).pointerDown().pointerUp().send();
  }

  promise_test(async (t) => {
    await new Promise(r => window.onload = () => t.step_timeout(r, 0));

    const match_params = [
      [elm1, "--trigger"],
      [elm2, "--trigger"],
      [elm3, "--trigger"],
    ];

    await test_navigation(t, "nav1", ()=> { clickElm(elm1); },       [1,0,0], [1,0,0], match_params);
    await test_navigation(t, "nav2", ()=> { navigation.back(); },    [0,0,0], [0,0,0], match_params);
    await test_navigation(t, "nav3", ()=> { navigation.forward(); }, [0,0,0], [0,0,0], match_params);
    await test_navigation(t, "nav4", ()=> { clickElm(elm2); },       [0,1,0], [0,1,0], match_params);
  }, ":trigger-link");
</script>
