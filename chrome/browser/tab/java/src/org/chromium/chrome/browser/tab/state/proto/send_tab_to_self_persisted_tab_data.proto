syntax = "proto2";

package org.chromium.chrome.browser.tab.proto;

option java_package = "org.chromium.chrome.browser.tab.proto";

message SendTabToSelfPersistedTabDataProto {
  // The name of the device that sent the tab.
  optional string sender_device_name = 1;

  // The timestamp when this tab was added in the background.
  optional int64 addition_timestamp_ms = 2;

  // The GUID of the Send Tab to Self entry.
  optional string guid = 3;
}
