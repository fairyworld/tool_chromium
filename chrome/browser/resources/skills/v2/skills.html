<!DOCTYPE html>
<html dir="$i18n{textdirection}" lang="$i18n{language}" $i18n{webuiRefresh2026}>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="chrome://theme/colors.css?sets=ui,chrome">
  <link rel="stylesheet" href="chrome://resources/css/text_defaults_md.css">
  <title>$i18n{skillsTitle}</title>
  <link rel="icon" type="image/png" sizes="24x24" href="../favicon.png">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    webview {
      display: block;
      border: none;
      width: 100%;
      height: 100%;
    }

    webview[hidden] {
      display: block !important;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      pointer-events: none;
    }

    [hidden] {
      display: none;
    }

    @media (prefers-color-scheme: dark) {
      html {
        background: var(--md-background-color);
      }
    }

    html:not([webui-refresh-2026]) {
      body {
        background-color: var(--color-sys-base);
      }
    }
  </style>
</head>
<body>
  <webview id="webview" partition="glicskillspart" autosize="on"></webview>
  <script type="module" src="v2/skills.js"></script>
  <error-page id="error-page" hidden></error-page>
</body>
</html>
